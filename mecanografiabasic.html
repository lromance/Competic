<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecanografia Interactiva - QWERTY Espanyol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Colores por dedos (más vibrantes para claridad) */
        .finger-m-esq { border-bottom: 4px solid #f472b6 !important; } /* Petit Esq - Rosa */
        .finger-a-esq { border-bottom: 4px solid #a78bfa !important; } /* Anular Esq - Lila */
        .finger-p-esq { border-bottom: 4px solid #60a5fa !important; } /* Mig Esq - Blau */
        .finger-i-esq { border-bottom: 4px solid #4ade80 !important; } /* Índex Esq - Verd */
        
        .finger-i-dre { border-bottom: 4px solid #4ade80 !important; } /* Índex Dre - Verd */
        .finger-p-dre { border-bottom: 4px solid #60a5fa !important; } /* Mig Dre - Blau */
        .finger-a-dre { border-bottom: 4px solid #a78bfa !important; } /* Anular Dre - Lila */
        .finger-m-dre { border-bottom: 4px solid #f472b6 !important; } /* Petit Dre - Rosa */
        
        .finger-pulgar { border-bottom: 4px solid #facc15 !important; } /* Polzes - Groc */

        .key {
            height: 54px;
            min-width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.1s;
            user-select: none;
        }

        .key.active-press {
            background: #3b82f6 !important;
            transform: scale(0.95);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .key.target-hint {
            background: #422006;
            outline: 3px solid #eab308;
            z-index: 10;
        }

        .display-card {
            font-family: 'JetBrains Mono', monospace;
            background: #1e293b;
            border: 2px solid #334155;
            width: 150px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            line-height: 1;
        }

        .display-card.is-space {
            font-size: 28px;
            color: #94a3b8;
        }

        .status-correct { color: #22c55e; border-color: #22c55e; }
        .status-error { color: #ef4444; border-color: #ef4444; }
        
        .finger-indicator {
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 12px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .keyboard-container {
            max-width: 900px;
            margin: 0 auto;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: #64748b;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-5xl mx-auto text-center flex-grow">
        <h1 class="text-3xl font-bold mb-4 text-blue-400">Aprendre Mecanografia - Guia de Dits</h1>
        
        <div class="flex flex-wrap justify-center gap-2 mb-8">
            <button onclick="startSequence('series')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition">1. Sèries de Teclat</button>
            <button onclick="startSequence('alphabet')" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg text-sm font-medium transition">2. Abecedari</button>
            <button onclick="startSequence('random')" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm font-medium transition">3. Aleatori</button>
        </div>

        <div class="flex flex-col md:flex-row justify-center items-start gap-8 mb-10">
            <div class="flex flex-col items-center">
                <p class="text-xs text-slate-400 mb-2 uppercase tracking-tighter">Escriu aquesta:</p>
                <div id="targetDisplay" class="display-card text-yellow-400">-</div>
                <div id="fingerText" class="finger-indicator bg-slate-800 text-slate-300 mt-4 shadow-lg">Col·loca les mans a la fila base</div>
            </div>
            
            <div class="hidden md:flex items-center h-44 text-slate-700">
                <span class="text-5xl">➔</span>
            </div>

            <div class="flex flex-col items-center">
                <p class="text-xs text-slate-400 mb-2 uppercase tracking-tighter">La teva pulsació:</p>
                <div id="userDisplay" class="display-card text-slate-200">-</div>
            </div>
        </div>

        <div class="keyboard-container bg-slate-900 p-4 md:p-6 rounded-2xl shadow-2xl border border-slate-800">
            <div id="keyboardRows" class="flex flex-col gap-2"></div>
        </div>

        <div class="mt-6 flex justify-center gap-6 text-[11px] font-bold uppercase tracking-widest text-slate-500">
            <span class="flex items-center gap-2"><span class="w-3 h-3 bg-pink-400 rounded-full"></span> Dit Petit</span>
            <span class="flex items-center gap-2"><span class="w-3 h-3 bg-violet-400 rounded-full"></span> Anular</span>
            <span class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-400 rounded-full"></span> Cor / Mig</span>
            <span class="flex items-center gap-2"><span class="w-3 h-3 bg-green-400 rounded-full"></span> Índex</span>
            <span class="flex items-center gap-2"><span class="w-3 h-3 bg-yellow-400 rounded-full"></span> Polze</span>
        </div>
    </div>

    <footer class="text-center">
        (c) Luis Romance - COMPETIC - <a href="http://www.cfalapau.cat" target="_blank" class="hover:text-blue-400 underline transition">www.cfalapau.cat</a>
    </footer>

    <script>
        const targetDisplay = document.getElementById('targetDisplay');
        const userDisplay = document.getElementById('userDisplay');
        const fingerText = document.getElementById('fingerText');
        const keyboardRows = document.getElementById('keyboardRows');

        // Mapeo de dedos actualizado con nombres más claros
        const fingerMap = {
            "1": "m-esq", "Q": "m-esq", "A": "m-esq", "Z": "m-esq", "º": "m-esq",
            "2": "a-esq", "W": "a-esq", "S": "a-esq", "X": "a-esq",
            "3": "p-esq", "E": "p-esq", "D": "p-esq", "C": "p-esq",
            "4": "i-esq", "R": "i-esq", "F": "i-esq", "V": "i-esq", "5": "i-esq", "T": "i-esq", "G": "i-esq", "B": "i-esq",
            "6": "i-dre", "Y": "i-dre", "H": "i-dre", "N": "i-dre", "7": "i-dre", "U": "i-dre", "J": "i-dre", "M": "i-dre",
            "8": "p-dre", "I": "p-dre", "K": "p-dre", ",": "p-dre",
            "9": "a-dre", "O": "a-dre", "L": "a-dre", ".": "a-dre",
            "0": "m-dre", "P": "m-dre", "Ñ": "m-dre", "-": "m-dre", "'": "m-dre", "¡": "m-dre", "Backspace": "m-dre", "`": "m-dre", "+": "m-dre", "´": "m-dre", "Ç": "m-dre",
            "Space": "pulgar"
        };

        const fingerNames = {
            "m-esq": "Mà Esquerra - Dit Petit",
            "a-esq": "Mà Esquerra - Anular",
            "p-esq": "Mà Esquerra - Dit del Mig",
            "i-esq": "Mà Esquerra - Índex",
            "i-dre": "Mà Dreta - Índex",
            "p-dre": "Mà Dreta - Dit del Mig",
            "a-dre": "Mà Dreta - Anular",
            "m-dre": "Mà Dreta - Dit Petit",
            "pulgar": "Qualsevol Polze"
        };

        const layout = [
            ["º", "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "'", "¡", "Backspace"],
            ["Tab", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "`", "+"],
            ["Caps", "A", "S", "D", "F", "G", "H", "J", "K", "L", "Ñ", "´", "Ç", "Enter"],
            ["Shift", "<", "Z", "X", "C", "V", "B", "N", "M", ",", ".", "-", "Shift"],
            ["Space"]
        ];

        const sequences = {
            series: "ASDFGHJKLÑ QWERTYUIOP ZXCVBNM,.- Ç´`+ ¡'0987654321º QAZ WSX EDC RFV TGB YHN UJM KIL OÑº Ç. P, QWERTYUIOP ASDFGHJKLÑ ZXCVBNM ZAQ XSW CDE VFR BGT NHY MJU LIK Ñ O P",
            alphabet: "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ ZYXWVUTSRQPONÑMLKJIHGFEDCBA",
            random: "" 
        };

        let currentSequence = [];
        let currentIndex = 0;

        function initKeyboard() {
            keyboardRows.innerHTML = '';
            layout.forEach((row) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "flex gap-1 justify-center w-full";
                row.forEach(key => {
                    const keyDiv = document.createElement('div');
                    keyDiv.className = "key flex-1 md:flex-none";
                    keyDiv.textContent = (key === "Space" || key === "Shift" || key === "Backspace") ? key : key;
                    if(key === "Space") keyDiv.textContent = "";
                    
                    keyDiv.id = `key-${key.toUpperCase()}`;
                    
                    if (fingerMap[key]) {
                        keyDiv.classList.add(`finger-${fingerMap[key]}`);
                    }

                    if(key === "Backspace") keyDiv.style.minWidth = "80px";
                    if(key === "Tab") keyDiv.style.minWidth = "60px";
                    if(key === "Caps") keyDiv.style.minWidth = "75px";
                    if(key === "Enter") keyDiv.style.minWidth = "80px";
                    if(key === "Shift") keyDiv.style.minWidth = "95px";
                    if(key === "Space") keyDiv.style.minWidth = "300px";

                    rowDiv.appendChild(keyDiv);
                });
                keyboardRows.appendChild(rowDiv);
            });
        }

        function startSequence(type) {
            let text = "";
            if (type === 'random') {
                const chars = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZÇ0123456789";
                for(let i=0; i<30; i++) text += chars.charAt(Math.floor(Math.random() * chars.length)) + (i % 5 === 0 ? " " : "");
            } else {
                text = sequences[type];
            }
            currentSequence = text.split('');
            currentIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            if (currentIndex < currentSequence.length) {
                const char = currentSequence[currentIndex];
                const upperChar = char.toUpperCase();
                
                if (char === " ") {
                    targetDisplay.textContent = "ESPAI";
                    targetDisplay.classList.add('is-space');
                } else {
                    targetDisplay.textContent = upperChar;
                    targetDisplay.classList.remove('is-space');
                }

                userDisplay.textContent = "-";
                userDisplay.className = "display-card text-slate-200 border-slate-700";
                
                const fingerKey = char === " " ? "Space" : upperChar;
                const fingerCode = fingerMap[fingerKey];
                if (fingerCode) {
                    fingerText.textContent = fingerNames[fingerCode];
                    const colors = {
                        "m-esq": "#f472b6", "a-esq": "#a78bfa", "p-esq": "#60a5fa", "i-esq": "#4ade80",
                        "i-dre": "#4ade80", "p-dre": "#60a5fa", "a-dre": "#a78bfa", "m-dre": "#f472b6",
                        "pulgar": "#facc15"
                    };
                    fingerText.style.color = colors[fingerCode];
                    fingerText.style.borderColor = colors[fingerCode];
                }

                document.querySelectorAll('.key').forEach(k => k.classList.remove('target-hint'));
                const keyId = char === " " ? "key-SPACE" : `key-${upperChar}`;
                const keyElem = document.getElementById(keyId);
                if (keyElem) keyElem.classList.add('target-hint');
            } else {
                targetDisplay.textContent = "FI!";
                targetDisplay.classList.remove('is-space');
                fingerText.textContent = "Molt bé! Has acabat.";
                fingerText.style.color = "#22c55e";
                fingerText.style.borderColor = "#22c55e";
                userDisplay.textContent = "🏆";
            }
        }

        window.addEventListener('keydown', (e) => {
            let keyPushed = e.key.toUpperCase();
            if (e.code === "Space") keyPushed = " ";
            
            const keyId = e.code === "Space" ? "key-SPACE" : `key-${keyPushed}`;
            const visualKey = document.getElementById(keyId);
            if (visualKey) {
                visualKey.classList.add('active-press');
                setTimeout(() => visualKey.classList.remove('active-press'), 150);
            }

            if (currentIndex >= currentSequence.length) return;

            const targetChar = currentSequence[currentIndex].toUpperCase();
            if (e.key.length > 1 && e.code !== "Space") return;

            if (keyPushed === " ") {
                userDisplay.textContent = "ESPAI";
                userDisplay.classList.add('is-space');
            } else {
                userDisplay.textContent = keyPushed;
                userDisplay.classList.remove('is-space');
            }

            if (keyPushed === targetChar) {
                userDisplay.classList.remove('status-error');
                userDisplay.classList.add('status-correct');
                setTimeout(() => {
                    currentIndex++;
                    updateDisplay();
                }, 150);
            } else {
                userDisplay.classList.add('status-error');
            }
        });

        initKeyboard();
        startSequence('series');

    </script>
</body>
</html>
