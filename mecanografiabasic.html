<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecanografia Interactiva - QWERTY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Layout Panoràmic (Desktop) */
        @media (min-width: 1024px) {
            body {
                flex-direction: row;
            }
            #sidebar {
                width: 300px;
                border-right: 1px solid #334155;
                padding: 2rem;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                height: 100vh;
                position: sticky;
                top: 0;
            }
            #main-content {
                flex: 1;
                padding: 1rem 2rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 1rem;
            }
        }

        /* Layout Mòbil o Altura Petita */
        @media (max-width: 1023px) {
            #sidebar {
                padding: 1rem;
                border-bottom: 1px solid #334155;
            }
            #main-content {
                padding: 1rem;
                flex-grow: 1;
            }
            footer { display: none; } /* Amagat en mòbil per estalviar espai */
        }

        /* Ajustos per altura petita */
        @media (max-height: 700px) {
            .display-card {
                height: clamp(80px, 15vh, 120px) !important;
                width: clamp(80px, 15vw, 120px) !important;
                font-size: clamp(30px, 6vw, 60px) !important;
            }
            h1 { font-size: 1.25rem !important; }
            .keyboard-container { padding: 0.5rem !important; }
            .key { height: clamp(30px, 6vh, 45px) !important; }
        }

        /* Colors per dits */
        .finger-m-esq { border-bottom: 4px solid #f472b6 !important; }
        .finger-a-esq { border-bottom: 4px solid #a78bfa !important; }
        .finger-p-esq { border-bottom: 4px solid #60a5fa !important; }
        .finger-i-esq { border-bottom: 4px solid #4ade80 !important; }
        .finger-i-dre { border-bottom: 4px solid #4ade80 !important; }
        .finger-p-dre { border-bottom: 4px solid #60a5fa !important; }
        .finger-a-dre { border-bottom: 4px solid #a78bfa !important; }
        .finger-m-dre { border-bottom: 4px solid #f472b6 !important; }
        .finger-pulgar { border-bottom: 4px solid #facc15 !important; }

        .key {
            height: clamp(35px, 7vh, 50px);
            min-width: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            font-weight: 600;
            font-size: clamp(9px, 1.5vw, 13px);
            transition: all 0.05s;
            user-select: none;
            flex: 1;
        }

        .key.active-press {
            background: #3b82f6 !important;
            transform: scale(0.92);
        }

        .key.target-hint {
            background: #422006;
            outline: 2px solid #eab308;
            z-index: 10;
        }

        .display-card {
            font-family: 'JetBrains Mono', monospace;
            background: #1e293b;
            border: 2px solid #475569;
            width: clamp(100px, 15vw, 140px);
            height: clamp(100px, 18vh, 160px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(40px, 8vw, 80px);
            border-radius: 12px;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
            transition: all 0.2s;
        }

        .display-card.is-special {
            font-size: clamp(14px, 3vw, 20px) !important;
            color: #94a3b8;
        }

        .status-correct { color: #22c55e; border-color: #22c55e; box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .status-error { color: #ef4444; border-color: #ef4444; }
        
        .finger-indicator {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            min-width: 160px;
        }

        .keyboard-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- Lateral / Header -->
    <aside id="sidebar">
        <div>
            <h1 class="text-2xl font-bold mb-6 text-blue-400 leading-tight">Mecanografia<br>Interactiva</h1>
            <div class="flex flex-col gap-3">
                <button onclick="startSequence('series')" class="w-full bg-blue-600 hover:bg-blue-700 px-4 py-2.5 rounded-lg text-sm font-semibold transition text-left flex items-center justify-between">
                    <span>1. Sèries</span>
                    <span class="text-blue-300 text-xs">A-Z</span>
                </button>
                <button onclick="startSequence('alphabet')" class="w-full bg-purple-600 hover:bg-purple-700 px-4 py-2.5 rounded-lg text-sm font-semibold transition text-left flex items-center justify-between">
                    <span>2. Abecedari</span>
                    <span class="text-purple-300 text-xs">ABC</span>
                </button>
                <button onclick="startSequence('random')" class="w-full bg-indigo-600 hover:bg-indigo-700 px-4 py-2.5 rounded-lg text-sm font-semibold transition text-left flex items-center justify-between">
                    <span>3. Aleatori</span>
                    <span class="text-indigo-300 text-xs">?</span>
                </button>
            </div>
        </div>

        <div class="hidden lg:block mt-8">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-4 tracking-widest">Llegenda de dits</p>
            <div class="grid grid-cols-1 gap-2 text-[10px] text-slate-400">
                <span class="flex items-center gap-2"><span class="w-2 h-2 bg-pink-400 rounded-full"></span> Petit</span>
                <span class="flex items-center gap-2"><span class="w-2 h-2 bg-violet-400 rounded-full"></span> Anular</span>
                <span class="flex items-center gap-2"><span class="w-2 h-2 bg-blue-400 rounded-full"></span> Mig</span>
                <span class="flex items-center gap-2"><span class="w-2 h-2 bg-green-400 rounded-full"></span> Índex</span>
                <span class="flex items-center gap-2"><span class="w-2 h-2 bg-yellow-400 rounded-full"></span> Polzes (Espai)</span>
            </div>
        </div>

        <footer class="mt-auto pt-6 text-[11px] text-slate-500">
            (c) Luis Romance<br>
            <a href="http://www.cfalapau.cat" target="_blank" class="hover:text-blue-400 transition underline">www.cfalapau.cat</a>
        </footer>
    </aside>

    <!-- Contingut Principal -->
    <main id="main-content">
        <div class="flex flex-col items-center gap-4">
            <div class="flex justify-center items-center gap-4 md:gap-12">
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Objectiu</span>
                    <div id="targetDisplay" class="display-card text-yellow-400">-</div>
                </div>
                
                <div class="text-slate-700 text-2xl hidden sm:block">➔</div>

                <div class="flex flex-col items-center gap-2">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">La teva tecla</span>
                    <div id="userDisplay" class="display-card text-slate-200">-</div>
                </div>
            </div>
            
            <div id="fingerText" class="finger-indicator text-slate-300">Selecciona un mode</div>
        </div>

        <div class="keyboard-container bg-slate-900/50 p-3 md:p-5 rounded-2xl border border-slate-800 backdrop-blur-sm">
            <div id="keyboardRows" class="flex flex-col gap-1.5"></div>
        </div>
    </main>

    <script>
        const targetDisplay = document.getElementById('targetDisplay');
        const userDisplay = document.getElementById('userDisplay');
        const fingerText = document.getElementById('fingerText');
        const keyboardRows = document.getElementById('keyboardRows');

        const fingerMap = {
            "1": "m-esq", "Q": "m-esq", "A": "m-esq", "Z": "m-esq", "º": "m-esq", "<": "m-esq",
            "2": "a-esq", "W": "a-esq", "S": "a-esq", "X": "a-esq",
            "3": "p-esq", "E": "p-esq", "D": "p-esq", "C": "p-esq",
            "4": "i-esq", "R": "i-esq", "F": "i-esq", "V": "i-esq", "5": "i-esq", "T": "i-esq", "G": "i-esq", "B": "i-esq",
            "6": "i-dre", "Y": "i-dre", "H": "i-dre", "N": "i-dre", "7": "i-dre", "U": "i-dre", "J": "i-dre", "M": "i-dre",
            "8": "p-dre", "I": "p-dre", "K": "p-dre", ",": "p-dre",
            "9": "a-dre", "O": "a-dre", "L": "a-dre", ".": "a-dre",
            "0": "m-dre", "P": "m-dre", "Ñ": "m-dre", "-": "m-dre", "'": "m-dre", "¡": "m-dre", "Backspace": "m-dre", "`": "m-dre", "+": "m-dre", "´": "m-dre", "Ç": "m-dre",
            "Space": "pulgar", "Enter": "m-dre"
        };

        const fingerNames = {
            "m-esq": "Petit Esquerre", "a-esq": "Anular Esquerre", "p-esq": "Mig Esquerre", "i-esq": "Índex Esquerre",
            "i-dre": "Índex Dret", "p-dre": "Mig Dret", "a-dre": "Anular Dret", "m-dre": "Petit Dret", "pulgar": "Polze"
        };

        const layout = [
            ["º", "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "'", "¡", "Backspace"],
            ["Tab", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "`", "+"],
            ["Caps", "A", "S", "D", "F", "G", "H", "J", "K", "L", "Ñ", "´", "Ç", "Enter"],
            ["Shift", "<", "Z", "X", "C", "V", "B", "N", "M", ",", ".", "-", "Shift"],
            ["Space"]
        ];

        const sequences = {
            series: "ASDFGHJKLÑ´Ç QWERTYUIOP`+ <ZXCVBNM,.- º1234567890'¡ Ç´ÑLKJHGFDSA +`POIUYTREWQ -.,MNBVCXZ< QAZ WSX EDC RFV TGB YHN UJM IK, OL. PÑ- ZAQ XSW CDE VFR BGT NHY MJU ,KI .LO -ÑP PÑ- OL. IK, UJM YHN TGB RFV EDC WSX QAZ -ÑP .LO ,KI MJU NHY BGT VFR CDE XSW ZAQ ",
            alphabet: "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ ",
            random: "" 
        };

        let currentSequence = [];
        let currentIndex = 0;

        function initKeyboard() {
            keyboardRows.innerHTML = '';
            layout.forEach((row) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "flex gap-1 justify-center w-full";
                row.forEach(key => {
                    const keyDiv = document.createElement('div');
                    keyDiv.className = "key";
                    keyDiv.textContent = key === "Space" ? "" : key;
                    keyDiv.id = `key-${key.toUpperCase().replace('´', 'ACCENT').replace('`', 'OBERT')}`;
                    
                    if (fingerMap[key]) keyDiv.classList.add(`finger-${fingerMap[key]}`);

                    if(key === "Backspace") keyDiv.style.flex = "2";
                    if(key === "Tab" || key === "Caps") keyDiv.style.flex = "1.5";
                    if(key === "Enter") keyDiv.style.flex = "2";
                    if(key === "Shift") keyDiv.style.flex = "2.5";
                    if(key === "Space") keyDiv.style.flex = "8";

                    rowDiv.appendChild(keyDiv);
                });
                keyboardRows.appendChild(rowDiv);
            });
        }

        function startSequence(type) {
            let text = "";
            if (type === 'random') {
                const chars = "ASDFGHJKLÑQWERTYUIOPZXCVBNM";
                for(let i=0; i<20; i++) text += chars.charAt(Math.floor(Math.random() * chars.length));
                text += " "; 
            } else {
                text = sequences[type];
            }
            currentSequence = text.split('');
            currentIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            if (currentIndex < currentSequence.length) {
                const char = currentSequence[currentIndex];
                const upperChar = char.toUpperCase();
                
                targetDisplay.classList.remove('is-special');
                if (char === " ") {
                    targetDisplay.textContent = "ESPAI";
                    targetDisplay.classList.add('is-special');
                } else if (char === "´" || char === "`") {
                    targetDisplay.textContent = `ACCENT (${char})`;
                    targetDisplay.classList.add('is-special');
                } else {
                    targetDisplay.textContent = upperChar;
                }

                userDisplay.textContent = "-";
                userDisplay.className = "display-card text-slate-200 border-slate-700";
                
                const fingerCode = fingerMap[char === " " ? "Space" : upperChar];
                if (fingerCode) {
                    fingerText.textContent = fingerNames[fingerCode];
                    const colors = {
                        "m-esq": "#f472b6", "a-esq": "#a78bfa", "p-esq": "#60a5fa", "i-esq": "#4ade80",
                        "i-dre": "#4ade80", "p-dre": "#60a5fa", "a-dre": "#a78bfa", "m-dre": "#f472b6",
                        "pulgar": "#facc15"
                    };
                    fingerText.style.color = colors[fingerCode];
                }

                document.querySelectorAll('.key').forEach(k => k.classList.remove('target-hint'));
                let searchId = upperChar;
                if(char === " ") searchId = "SPACE";
                if(char === "´") searchId = "ACCENT";
                if(char === "`") searchId = "OBERT";
                const keyElem = document.getElementById(`key-${searchId}`);
                if (keyElem) keyElem.classList.add('target-hint');
                
            } else {
                targetDisplay.textContent = "FI!";
                fingerText.textContent = "Sèrie completada!";
                fingerText.style.color = "#22c55e";
                userDisplay.textContent = "🏆";
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "Tab" || e.code === "Space") e.preventDefault();
            if (currentIndex >= currentSequence.length) return;

            let keyPushed = e.key.toUpperCase();
            if (e.code === "Space") keyPushed = " ";
            
            if (e.key === "Dead") {
                if (e.code === "Quote") keyPushed = "´";
                if (e.code === "BracketLeft") keyPushed = "`";
            }
            if (e.key === "´") keyPushed = "´";
            if (e.key === "`") keyPushed = "`";

            let visualId = keyPushed;
            if(keyPushed === " ") visualId = "SPACE";
            if(keyPushed === "´") visualId = "ACCENT";
            if(keyPushed === "`") visualId = "OBERT";
            const visualKey = document.getElementById(`key-${visualId}`);
            if (visualKey) {
                visualKey.classList.add('active-press');
                setTimeout(() => visualKey.classList.remove('active-press'), 100);
            }

            if (e.key.length > 1 && e.code !== "Space" && e.key !== "Dead") return;

            userDisplay.classList.remove('is-special');
            if (keyPushed === " ") {
                userDisplay.textContent = "ESPAI";
                userDisplay.classList.add('is-special');
            } else {
                userDisplay.textContent = keyPushed;
            }

            const targetChar = currentSequence[currentIndex].toUpperCase();
            if (keyPushed === targetChar) {
                userDisplay.className = "display-card status-correct";
                currentIndex++;
                setTimeout(updateDisplay, 100);
            } else {
                userDisplay.classList.add('status-error');
            }
        });

        initKeyboard();
        startSequence('series');
    </script>
</body>
</html>
