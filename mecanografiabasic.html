<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecanografia Interactiva - QWERTY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            margin: 0;
        }

        /* Colors per dits */
        .finger-m-esq { border-bottom: 4px solid #f472b6 !important; }
        .finger-a-esq { border-bottom: 4px solid #a78bfa !important; }
        .finger-p-esq { border-bottom: 4px solid #60a5fa !important; }
        .finger-i-esq { border-bottom: 4px solid #4ade80 !important; }
        .finger-i-dre { border-bottom: 4px solid #4ade80 !important; }
        .finger-p-dre { border-bottom: 4px solid #60a5fa !important; }
        .finger-a-dre { border-bottom: 4px solid #a78bfa !important; }
        .finger-m-dre { border-bottom: 4px solid #f472b6 !important; }
        .finger-pulgar { border-bottom: 4px solid #facc15 !important; }

        .key {
            height: clamp(40px, 8vh, 54px);
            min-width: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            font-weight: 600;
            font-size: clamp(10px, 2vw, 14px);
            transition: all 0.05s;
            user-select: none;
            flex: 1;
        }

        .key.active-press {
            background: #3b82f6 !important;
            transform: scale(0.92);
        }

        .key.target-hint {
            background: #422006;
            outline: 3px solid #eab308;
            z-index: 10;
        }

        .display-card {
            font-family: 'JetBrains Mono', monospace;
            background: #1e293b;
            border: 2px solid #334155;
            width: clamp(100px, 20vw, 150px);
            height: clamp(120px, 25vh, 180px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(40px, 10vw, 100px);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .display-card.is-special {
            font-size: clamp(16px, 4vw, 24px);
            color: #94a3b8;
            padding: 10px;
        }

        .status-correct { color: #22c55e; border-color: #22c55e; }
        .status-error { color: #ef4444; border-color: #ef4444; }
        
        .finger-indicator {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            margin-top: 10px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .keyboard-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        footer {
            padding: 1rem;
            color: #64748b;
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-5xl mx-auto text-center flex-grow flex flex-col justify-between">
        <header>
            <h1 class="text-2xl md:text-3xl font-bold mb-2 text-blue-400">Mecanografia Interactiva</h1>
            <div class="flex flex-wrap justify-center gap-2 mb-4">
                <button onclick="startSequence('series')" class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-lg text-xs font-medium transition">1. Sèries</button>
                <button onclick="startSequence('alphabet')" class="bg-purple-600 hover:bg-purple-700 px-3 py-1.5 rounded-lg text-xs font-medium transition">2. Abecedari</button>
                <button onclick="startSequence('random')" class="bg-indigo-600 hover:bg-indigo-700 px-3 py-1.5 rounded-lg text-xs font-medium transition">3. Aleatori</button>
            </div>
        </header>

        <main>
            <div class="flex justify-center items-center gap-4 md:gap-8 mb-6">
                <div class="flex flex-col items-center">
                    <p class="text-[10px] text-slate-400 mb-1 uppercase tracking-tighter">Objectiu:</p>
                    <div id="targetDisplay" class="display-card text-yellow-400">-</div>
                    <div id="fingerText" class="finger-indicator text-slate-300">Inicia una sèrie</div>
                </div>
                
                <div class="hidden md:block text-slate-700 text-4xl">➔</div>

                <div class="flex flex-col items-center">
                    <p class="text-[10px] text-slate-400 mb-1 uppercase tracking-tighter">La teva tecla:</p>
                    <div id="userDisplay" class="display-card text-slate-200">-</div>
                </div>
            </div>

            <div class="keyboard-container bg-slate-900 p-2 md:p-4 rounded-xl border border-slate-800">
                <div id="keyboardRows" class="flex flex-col gap-1.5"></div>
            </div>
        </main>

        <section class="mt-4 flex flex-wrap justify-center gap-3 text-[10px] font-bold uppercase text-slate-500">
            <span class="flex items-center gap-1"><span class="w-2 h-2 bg-pink-400 rounded-full"></span> Petit</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 bg-violet-400 rounded-full"></span> Anular</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 bg-blue-400 rounded-full"></span> Mig</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 bg-green-400 rounded-full"></span> Índex</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 bg-yellow-400 rounded-full"></span> Polze</span>
        </section>
    </div>

    <footer class="text-center">
        (c) Luis Romance - <a href="http://www.cfalapau.cat" target="_blank" class="underline">www.cfalapau.cat</a>
    </footer>

    <script>
        const targetDisplay = document.getElementById('targetDisplay');
        const userDisplay = document.getElementById('userDisplay');
        const fingerText = document.getElementById('fingerText');
        const keyboardRows = document.getElementById('keyboardRows');

        const fingerMap = {
            "1": "m-esq", "Q": "m-esq", "A": "m-esq", "Z": "m-esq", "º": "m-esq", "<": "m-esq",
            "2": "a-esq", "W": "a-esq", "S": "a-esq", "X": "a-esq",
            "3": "p-esq", "E": "p-esq", "D": "p-esq", "C": "p-esq",
            "4": "i-esq", "R": "i-esq", "F": "i-esq", "V": "i-esq", "5": "i-esq", "T": "i-esq", "G": "i-esq", "B": "i-esq",
            "6": "i-dre", "Y": "i-dre", "H": "i-dre", "N": "i-dre", "7": "i-dre", "U": "i-dre", "J": "i-dre", "M": "i-dre",
            "8": "p-dre", "I": "p-dre", "K": "p-dre", ",": "p-dre",
            "9": "a-dre", "O": "a-dre", "L": "a-dre", ".": "a-dre",
            "0": "m-dre", "P": "m-dre", "Ñ": "m-dre", "-": "m-dre", "'": "m-dre", "¡": "m-dre", "Backspace": "m-dre", "`": "m-dre", "+": "m-dre", "´": "m-dre", "Ç": "m-dre",
            "Space": "pulgar", "Enter": "m-dre"
        };

        const fingerNames = {
            "m-esq": "Petit Esquerre", "a-esq": "Anular Esquerre", "p-esq": "Mig Esquerre", "i-esq": "Índex Esquerre",
            "i-dre": "Índex Dret", "p-dre": "Mig Dret", "a-dre": "Anular Dret", "m-dre": "Petit Dret", "pulgar": "Polze"
        };

        const layout = [
            ["º", "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "'", "¡", "Backspace"],
            ["Tab", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "`", "+"],
            ["Caps", "A", "S", "D", "F", "G", "H", "J", "K", "L", "Ñ", "´", "Ç", "Enter"],
            ["Shift", "<", "Z", "X", "C", "V", "B", "N", "M", ",", ".", "-", "Shift"],
            ["Space"]
        ];

        // Seqüències actualitzades sense espais intermedis molestos
        const sequences = {
            series: "ASDFGHJKLÑ QWERTYUIOP ZXCVBNM,.- Ç´`+¡' 0987654321º QAZ WSX EDC RFV TGB YHN UJM KIL OÑº Ç. P, QWERTYUIOP ASDFGHJKLÑ ZXCVBNM ZAQ XSW CDE VFR BGT NHY MJU LIK ÑOP",
            alphabet: "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ",
            random: "" 
        };

        let currentSequence = [];
        let currentIndex = 0;

        function initKeyboard() {
            keyboardRows.innerHTML = '';
            layout.forEach((row) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "flex gap-1 justify-center w-full";
                row.forEach(key => {
                    const keyDiv = document.createElement('div');
                    keyDiv.className = "key";
                    keyDiv.textContent = key === "Space" ? "" : key;
                    keyDiv.id = `key-${key.toUpperCase().replace('´', 'ACCENT').replace('`', 'OBERT')}`;
                    
                    if (fingerMap[key]) keyDiv.classList.add(`finger-${fingerMap[key]}`);

                    // Amples especials
                    if(key === "Backspace") keyDiv.style.flex = "2";
                    if(key === "Tab" || key === "Caps") keyDiv.style.flex = "1.5";
                    if(key === "Enter") keyDiv.style.flex = "2";
                    if(key === "Shift") keyDiv.style.flex = "2.5";
                    if(key === "Space") keyDiv.style.flex = "8";

                    rowDiv.appendChild(keyDiv);
                });
                keyboardRows.appendChild(rowDiv);
            });
        }

        function startSequence(type) {
            let text = "";
            if (type === 'random') {
                const chars = "ASDFGHJKLÑQWERTYUIOPZXCVBNM";
                // Random sense espais intermedis, només un al final
                for(let i=0; i<20; i++) text += chars.charAt(Math.floor(Math.random() * chars.length));
                text += " "; 
            } else {
                text = sequences[type];
            }
            currentSequence = text.split('');
            currentIndex = 0;
            updateDisplay();
        }

        function updateDisplay() {
            if (currentIndex < currentSequence.length) {
                const char = currentSequence[currentIndex];
                const upperChar = char.toUpperCase();
                
                targetDisplay.classList.remove('is-special');
                if (char === " ") {
                    targetDisplay.textContent = "ESPAI";
                    targetDisplay.classList.add('is-special');
                } else if (char === "´") {
                    targetDisplay.textContent = "ACCENT (´)";
                    targetDisplay.classList.add('is-special');
                } else if (char === "`") {
                    targetDisplay.textContent = "ACCENT (`)";
                    targetDisplay.classList.add('is-special');
                } else {
                    targetDisplay.textContent = upperChar;
                }

                userDisplay.textContent = "-";
                userDisplay.className = "display-card text-slate-200 border-slate-700";
                
                // Pista de dit
                const fingerCode = fingerMap[char === " " ? "Space" : upperChar];
                if (fingerCode) {
                    fingerText.textContent = fingerNames[fingerCode];
                    const colors = {
                        "m-esq": "#f472b6", "a-esq": "#a78bfa", "p-esq": "#60a5fa", "i-esq": "#4ade80",
                        "i-dre": "#4ade80", "p-dre": "#60a5fa", "a-dre": "#a78bfa", "m-dre": "#f472b6",
                        "pulgar": "#facc15"
                    };
                    fingerText.style.color = colors[fingerCode];
                }

                // Ressaltar tecla
                document.querySelectorAll('.key').forEach(k => k.classList.remove('target-hint'));
                let searchId = upperChar;
                if(char === " ") searchId = "SPACE";
                if(char === "´") searchId = "ACCENT";
                if(char === "`") searchId = "OBERT";
                const keyElem = document.getElementById(`key-${searchId}`);
                if (keyElem) keyElem.classList.add('target-hint');
                
            } else {
                targetDisplay.textContent = "FI!";
                fingerText.textContent = "Molt bé! Sèrie completada.";
                fingerText.style.color = "#22c55e";
                userDisplay.textContent = "🏆";
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "Tab" || e.code === "Space") e.preventDefault();
            if (currentIndex >= currentSequence.length) return;

            let keyPushed = e.key.toUpperCase();
            if (e.code === "Space") keyPushed = " ";
            
            // Gestió d'accents (tecles mortes)
            if (e.key === "Dead") {
                if (e.code === "Quote") keyPushed = "´";
                if (e.code === "BracketLeft") keyPushed = "`";
            }
            if (e.key === "´") keyPushed = "´";
            if (e.key === "`") keyPushed = "`";

            // Animació visual tecla
            let visualId = keyPushed;
            if(keyPushed === " ") visualId = "SPACE";
            if(keyPushed === "´") visualId = "ACCENT";
            if(keyPushed === "`") visualId = "OBERT";
            const visualKey = document.getElementById(`key-${visualId}`);
            if (visualKey) {
                visualKey.classList.add('active-press');
                setTimeout(() => visualKey.classList.remove('active-press'), 100);
            }

            // Ignorar tecles de control com Shift, Alt, etc.
            if (e.key.length > 1 && e.code !== "Space" && e.key !== "Dead") return;

            // Feedback visual
            userDisplay.classList.remove('is-special');
            if (keyPushed === " ") {
                userDisplay.textContent = "ESPAI";
                userDisplay.classList.add('is-special');
            } else {
                userDisplay.textContent = keyPushed;
            }

            // Validació
            const targetChar = currentSequence[currentIndex].toUpperCase();
            if (keyPushed === targetChar) {
                userDisplay.className = "display-card status-correct";
                currentIndex++;
                setTimeout(updateDisplay, 100);
            } else {
                userDisplay.classList.add('status-error');
            }
        });

        initKeyboard();
        startSequence('series');
    </script>
</body>
</html>
